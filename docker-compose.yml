services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tccdb
      POSTGRES_USER: tccuser
      POSTGRES_PASSWORD: tccpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    command: sh -c "python manage.py migrate && gunicorn tcc_project.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-secret-compose
      ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://tccuser:tccpass@db:5432/tccdb
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  pgdata:
